name: "Publish Release"

on:
  push:
    branches:
      - main # 当你推送到 main 分支时触发

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # 打包 macOS (M1/M2/M3/M4 兼容)
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # 打包 macOS (Intel 兼容)
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # 打包 Linux
            args: ""
          - platform: "windows-latest" # 打包 Windows
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      
      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.0

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # 针对跨平台编译需要添加 target
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: pnpm install # 如果你用 yarn 或 pnpm，请对应修改

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_AUTH_TOKEN: ${{ secrets.TAURI_AUTH_TOKEN }}
        with:
          tagName: app-v__VERSION__ # 会自动替换 tauri.conf.json 里的版本号
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets below to download the latest version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}